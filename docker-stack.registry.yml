services:
  registry:
    image: registry:2
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: ingress
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - registry
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  registry:
    driver: overlay
    attachable: true

volumes:
  registry_data:

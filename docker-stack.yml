# docker-stack.yml — deploy local simulando o Dokploy com Docker Swarm
#
# Pré-requisitos:
#   docker swarm init
#   docker run -d -p 5000:5000 --name registry --restart=always registry:2
#   docker build -t localhost:5000/laravel-app:latest .
#   docker push localhost:5000/laravel-app:latest
#
# Deploy:
#   export APP_KEY=base64:... DB_PASSWORD=secret TAG=$(git rev-parse --short HEAD)
#   docker stack deploy -c docker-stack.yml laravel-demo
#
# Ou via script:
#   sh scripts/deploy.sh     # build + tag + push + rolling update
#   sh scripts/rollback.sh   # rollback para versão anterior
#   sh scripts/rollback.sh --list   # listar tags disponíveis
#
# Diferenças em relação ao docker-compose.yml:
#   - Usa a imagem do registry local (localhost:5000) em vez de build: .
#   - Remove depends_on (ignorado no Swarm; o entrypoint.sh aguarda o DB)
#   - Remove healthcheck de nível de serviço (gerenciado pelo Swarm via restart_policy)
#   - Usa seções deploy: com replicas e restart_policy

configs:
  traefik_static:
    file: ./traefik/traefik.yml
  traefik_dynamic_init:
    file: ./traefik/dynamic.yml

services:
  traefik:
    image: traefik:v3.6
    ports:
      - "80:80"      # entry point HTTP
      - "8080:8080"  # dashboard
    volumes:
      - traefik_dynamic:/etc/traefik/conf.d   # dynamic configs gerenciados pelo traefik-manager
      - traefik_logs:/var/log/traefik
    configs:
      - source: traefik_static
        target: /etc/traefik/traefik.yml
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  traefik-manager:
    image: ghcr.io/chr0nzz/traefik-manager:latest
    ports:
      - "8090:5000"  # 5000 conflicts with local Docker registry used for Swarm testing
    environment:
      TRAEFIK_API_URL: http://traefik:8080
      DOMAINS: ${APP_DOMAIN:-localhost}
      CERT_RESOLVER: none
      ADMIN_PASSWORD: ${TM_PASSWORD:-admin}
      COOKIE_SECURE: "false"
      CONFIG_PATH: /etc/traefik/conf.d/dynamic.yml
    volumes:
      - traefik_dynamic:/etc/traefik/conf.d
      - tm_config:/app/config
      - tm_backups:/app/backups
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  app:
    image: localhost:5000/laravel-app:${TAG:-latest}
    ports:
      - "8001:8001"
    volumes:
      - laravel_storage:/app/storage/framework
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8001}
      APP_KEY: ${APP_KEY}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      # Database
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      # Storage (MinIO / S3)
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: ${MINIO_BUCKET:-laravel}
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      # Sessions via DB (seguro para multi-nó)
      SESSION_DRIVER: database
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1       # atualiza uma réplica por vez (rolling update)
        delay: 10s
        failure_action: rollback

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager  # garante que o volume postgres_data fique sempre no mesmo nó

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager  # garante que o volume minio_data fique sempre no mesmo nó

  traefik-init:
    image: alpine:latest
    # Seeds dynamic.yml into the traefik_dynamic volume on first boot
    command: >
      sh -c '
        cp /init/dynamic.yml /conf.d/dynamic.yml;
        echo "Traefik dynamic config seeded."
      '
    volumes:
      - traefik_dynamic:/conf.d
    configs:
      - source: traefik_dynamic_init
        target: /init/dynamic.yml
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/$${MINIO_BUCKET:-laravel};
        echo 'Bucket ready.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-laravel}
    deploy:
      replicas: 1
      restart_policy:
        condition: none  # roda uma vez só, não reinicia

volumes:
  laravel_storage:
  postgres_data:
  minio_data:
  traefik_dynamic:
  traefik_logs:
  tm_config:
  tm_backups:

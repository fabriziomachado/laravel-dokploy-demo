# Variáveis vêm do .env gerado pelo Dokploy (aba Environment).
# Defina APP_KEY, DB_*, AWS_*, etc. no console — não neste arquivo.

services:
  app:
    image: ghcr.io/fabriziomachado/laravel-dokploy-demo:${IMAGE_TAG:-latest}
    expose:
      - "8001"
    env_file:
      - .env
    networks:
      - dokploy-network
    deploy:
      replicas: 2
      update_config:
        order: start-first
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@file_get_contents('http://localhost:8001/up'));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    image: ghcr.io/fabriziomachado/laravel-dokploy-demo:${IMAGE_TAG:-latest}
    command: ["php", "artisan", "queue:work", "database", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file:
      - .env
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  migrate:
    image: ghcr.io/fabriziomachado/laravel-dokploy-demo:${IMAGE_TAG:-latest}
    command: ["php", "artisan", "migrate", "--force"]
    env_file:
      - .env
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 5

networks:
  dokploy-network:
    external: true

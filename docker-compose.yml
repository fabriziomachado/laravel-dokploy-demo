services:
  app:
    build: .
    ports:
      - "8001:80"
    volumes:
      - laravel_storage:/app/storage
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/storage/database.sqlite
    restart: always

volumes:
  laravel_storage:

services:
  traefik:
    image: traefik:v3.6
    ports:
      - "80:80"      # HTTP (redireciona para HTTPS)
      - "443:443"    # HTTPS
      - "8080:8080"  # dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik:/etc/traefik/conf.d
      - traefik_certs:/etc/traefik/certs:ro
      - traefik_logs:/var/log/traefik
    restart: always

  traefik-certs-init:
    image: alpine:latest
    command:
      - sh
      - -c
      - |
        if [ ! -f /certs/cert.pem ]; then
          apk add --no-cache openssl >/dev/null 2>&1
          openssl req -x509 -nodes -newkey rsa:2048 -days 3650 \
            -keyout /certs/key.pem -out /certs/cert.pem \
            -subj '/CN=localhost/O=Dev/C=BR' \
            -addext 'subjectAltName=DNS:localhost,DNS:*.localhost,IP:127.0.0.1' \
            2>/dev/null
          echo 'Certificado TLS gerado (valido 10 anos).'
        else
          echo 'Certificado ja existe, reutilizando.'
        fi
    volumes:
      - traefik_certs:/certs

  traefik-manager:
    image: ghcr.io/chr0nzz/traefik-manager:latest
    ports:
      - "8090:5000"
    environment:
      TRAEFIK_API_URL: http://traefik:8080
      DOMAINS: localhost
      CERT_RESOLVER: none
      ADMIN_PASSWORD: ${TM_PASSWORD:-admin}
      COOKIE_SECURE: "false"
    volumes:
      - ./traefik/dynamic.yml:/app/config/dynamic.yml  # bind mount para dev local
      - tm_config:/app/config
      - tm_backups:/app/backups
    depends_on:
      - traefik
    restart: always

  app:
    build: .
    ports:
      - "8001:8001"  # acesso direto (sem Traefik)
    volumes:
      - laravel_storage:/app/storage/framework
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8001}
      APP_KEY: ${APP_KEY}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      # Database
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      # Storage (MinIO / S3)
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: ${MINIO_BUCKET:-laravel}
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      # Sessions via DB (seguro para multi-nó)
      SESSION_DRIVER: database
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-laravel}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/$${MINIO_BUCKET:-laravel};
        echo 'Bucket ready.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-laravel}

volumes:
  laravel_storage:
  postgres_data:
  minio_data:
  traefik_certs:
  traefik_logs:
  tm_config:
  tm_backups:

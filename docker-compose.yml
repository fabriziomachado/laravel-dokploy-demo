services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - laravel_storage:/app/storage
      - laravel_database:/app/database
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
    restart: always

volumes:
  laravel_storage:
  laravel_database:

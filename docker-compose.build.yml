# Build/push da imagem Laravel (usado pelo comando customizado do Dokploy).
# Dokploy prefixa "docker" só no 1º token; após "&&" use "docker" de novo.
#
# Advanced → Command (substitua STACK_NAME pelo App Name do serviço no Dokploy):
# compose -f docker-compose.build.yml build --push && docker stack deploy -c docker-compose.stack.yml STACK_NAME --prune --with-registry-auth

services:
  app:
    build: .
    image: ghcr.io/fabriziomachado/laravel-dokploy-demo:${IMAGE_TAG:-latest}

# Build/push da imagem Laravel.
# Tag imutável via IMAGE_TAG + :latest (ponteiro).
#
# Deploy automático (recomendado) — Dokploy Advanced → Command:
# compose -p dokploy-laravel-deploy -f docker-compose.deploy.yml run --rm deploy-runner
#
# Deploy manual (alternativa sem runner):
# compose -f docker-compose.build.yml build --push && docker stack deploy -c docker-compose.stack.yml STACK_NAME --prune --with-registry-auth --resolve-image always && docker service update --force STACK_NAME_app && docker service update --force STACK_NAME_worker

services:
  app:
    build: .
    image: ghcr.io/fabriziomachado/laravel-dokploy-demo:${IMAGE_TAG:-latest}

# Traefik dynamic configuration
# Managed by traefik-manager — http://localhost:5000
# Routes added here are applied without restarting Traefik (hot-reload via file.watch)
#
# In Swarm mode: 'laravel-demo_app' resolves to the Swarm VIP, which load-balances
# across all app replicas automatically.
# In Docker Compose: 'app' resolves directly to the single app container.

# Routes are managed by Traefik swarm provider via deploy labels.
# Use traefik-manager UI at :8090 to add custom routes/middlewares.
http: {}

# TLS certificate configuration
# Certificate is generated by traefik-certs-init service on first deploy.
# Stored in the traefik_certs volume — never committed to git.
tls:
  certificates:
    - certFile: /etc/traefik/certs/cert.pem
      keyFile: /etc/traefik/certs/key.pem
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/cert.pem
        keyFile: /etc/traefik/certs/key.pem

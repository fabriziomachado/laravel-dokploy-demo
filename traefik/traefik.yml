# Traefik static configuration
#
# Uses file provider only (no Docker socket required):
# - Routes are defined in /etc/traefik/conf.d/*.yml (managed by traefik-manager)
# - In Swarm mode: route to laravel-demo_app:8001 (Swarm VIP, LB between replicas)
# - In Docker Compose: route to app:8001
# - docker provider is used only when running via docker compose (non-Swarm)

api:
  insecure: true   # exposes dashboard on :8080 — disable in production
  dashboard: true

entryPoints:
  web:
    address: ":80"

providers:
  # Swarm provider: discovers services and load-balances per HTTP request
  # Requires Docker socket mount. Fixed in Traefik v3.6.2 (issue #12253)
  swarm:
    exposedByDefault: false
    network: laravel-demo_default

  # File provider: fallback routes and managed by traefik-manager UI
  file:
    directory: /etc/traefik/conf.d
    watch: true

log:
  level: INFO

accessLog:
  filePath: /var/log/traefik/access.log
